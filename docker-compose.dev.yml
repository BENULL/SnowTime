version: '3.8'

services:
  # 开发环境 SnowTime 服务
  snowtime-dev:
    build:
      context: .
      target: development
    container_name: snowtime-dev
    ports:
      - "3000:3000"
      - "5173:5173"  # Vite 开发服务器
    environment:
      - NODE_ENV=development
      - PORT=3000
      - HOST=0.0.0.0
    env_file:
      - .env.development
    volumes:
      - .:/app
      - /app/node_modules
      - /app/client/node_modules
      - ./logs:/app/logs
    networks:
      - snowtime-dev-network
    depends_on:
      - redis-dev

  # 开发环境 Redis
  redis-dev:
    image: redis:7-alpine
    container_name: snowtime-redis-dev
    ports:
      - "6379:6379"
    networks:
      - snowtime-dev-network

networks:
  snowtime-dev-network:
    driver: bridge